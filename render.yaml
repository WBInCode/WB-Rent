services:
  - type: web
    name: wb-rent-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://wb-rent.pl,https://www.wb-rent.pl
      - key: DATABASE_URL
        fromDatabase:
          name: wb-rent-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: '"WB-Rent" <noreply@wb-rent.pl>'
      - key: SITE_URL
        value: https://wb-rent.pl

databases:
  - name: wb-rent-db
    plan: free
